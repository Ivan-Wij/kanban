{{define "board.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Name}} - Kanban</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.js" integrity="sha384-Q+Dky3iHVJOr6wUjQ4ulh6uQ76an/t+ak1+PjMVaxRjbZamFLAG+u9InkfjbsEQf" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.7/Sortable.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        {{template "board_body" .}}
    </div>
    <div id="card-modal"></div>
    <div id="create-modal"></div>
    {{template "layout_scripts" .}}
</body>
</html>
{{end}}

{{define "board_body"}}
<div data-board-id="{{.ID}}">
{{template "board_header.html" .}}

{{template "board_search" .}}
{{template "project_filter" .}}

<div class="flex gap-4 overflow-x-auto pb-4">
    {{range .Columns}}
        {{template "column.html" .}}
    {{end}}
</div>
</div>
{{end}}
