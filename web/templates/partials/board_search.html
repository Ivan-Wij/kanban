{{define "board_search"}}
<div class="mb-6" data-board-search>
    <div class="flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-[200px] max-w-md">
            <input
                type="search"
                data-board-search-input
                placeholder="Search cards..."
                class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
        </div>
        <button
            type="button"
            data-board-search-clear
            class="hidden text-sm text-slate-500 hover:text-slate-700"
        >
            Clear search
        </button>
    </div>
</div>
{{end}}
