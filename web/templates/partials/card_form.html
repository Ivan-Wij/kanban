{{define "card_form.html"}}
<form
    hx-put="/cards/{{.ID}}"
    hx-target="#card-{{.ID}}"
    hx-swap="outerHTML"
    class="space-y-2"
>
    <p class="text-xs text-slate-500">{{.CardType.Label}}{{if .ParentTitle}} · under {{.ParentTitle}}{{end}}</p>
    <input
        type="text"
        name="title"
        value="{{.Title}}"
        required
        class="w-full rounded border border-slate-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    >
    <textarea
        name="description"
        rows="2"
        class="w-full rounded border border-slate-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
    >{{.Description}}</textarea>
    <div class="flex gap-2">
        <button
            type="submit"
            class="rounded bg-blue-600 px-2 py-1 text-xs font-medium text-white hover:bg-blue-700"
        >
            Save
        </button>
        <button
            type="button"
            hx-get="/cards/{{.ID}}"
            hx-target="#card-{{.ID}}"
            hx-swap="outerHTML"
            class="rounded bg-slate-200 px-2 py-1 text-xs font-medium text-slate-700 hover:bg-slate-300"
        >
            Cancel
        </button>
    </div>
</form>
{{end}}
