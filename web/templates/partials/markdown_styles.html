{{define "markdown_styles"}}
<style>
    .markdown-content > :first-child {
        margin-top: 0;
    }

    .markdown-content > :last-child {
        margin-bottom: 0;
    }

    .markdown-content p {
        margin: 0.5em 0;
    }

    .markdown-content ul,
    .markdown-content ol {
        margin: 0.5em 0;
        padding-left: 1.25rem;
    }

    .markdown-content ul {
        list-style-type: disc;
    }

    .markdown-content ol {
        list-style-type: decimal;
    }

    .markdown-content li {
        margin: 0.125em 0;
    }

    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3 {
        margin: 0.75em 0 0.375em;
        font-weight: 600;
        color: rgb(30 41 59);
    }

    .markdown-content h1 {
        font-size: 1.25rem;
    }

    .markdown-content h2 {
        font-size: 1.125rem;
    }

    .markdown-content h3 {
        font-size: 1rem;
    }

    .markdown-content code {
        border-radius: 0.25rem;
        background-color: rgb(241 245 249);
        padding: 0.125rem 0.25rem;
        font-size: 0.875em;
    }

    .markdown-content pre {
        margin: 0.5em 0;
        overflow-x: auto;
        border-radius: 0.375rem;
        background-color: rgb(15 23 42);
        padding: 0.75rem;
        color: rgb(241 245 249);
    }

    .markdown-content pre code {
        background: transparent;
        padding: 0;
        color: inherit;
    }

    .markdown-content blockquote {
        margin: 0.5em 0;
        border-left: 3px solid rgb(203 213 225);
        padding-left: 0.75rem;
        color: rgb(100 116 139);
    }

    .markdown-content a {
        color: rgb(37 99 235);
        text-decoration: underline;
    }
</style>
{{end}}
