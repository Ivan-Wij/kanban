{{define "board_header.html"}}
<header id="board-header" class="mb-8 flex items-start justify-between gap-4">
    <div class="min-w-0 flex-1">
        <a href="/" class="text-sm text-blue-600 hover:underline">&larr; All boards</a>
        <form
            hx-put="/boards/{{.ID}}"
            hx-target="#board-header"
            hx-swap="outerHTML"
            data-board-name-form
            autocomplete="off"
            class="mt-2"
        >
            <input
                type="text"
                name="name"
                value="{{.Name}}"
                required
                data-board-name-input
                data-saved-name="{{.Name}}"
                autocomplete="off"
                class="w-full text-3xl font-bold text-slate-800 rounded border border-transparent px-0 py-1 focus:border-slate-300 focus:px-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <div data-board-name-actions class="mt-2 hidden flex items-center gap-3">
                <button
                    type="submit"
                    data-board-name-save
                    class="rounded bg-blue-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-700"
                >
                    Save name
                </button>
                <span data-unsaved-label class="hidden text-sm font-medium text-amber-600">
                    Unsaved changes
                </span>
            </div>
        </form>
        <p class="text-slate-500 mt-1">Drag cards between columns to update status.</p>
    </div>
    <div class="flex shrink-0 items-center gap-2">
        <a
            href="/boards/{{.ID}}/archived/stories"
            class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
        >
            Archived stories
        </a>
        <button
            type="button"
            hx-get="/boards/{{.ID}}/cards/new"
            hx-target="#create-modal"
            hx-swap="innerHTML"
            class="rounded bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
        >
            Create
        </button>
    </div>
</header>
{{end}}
