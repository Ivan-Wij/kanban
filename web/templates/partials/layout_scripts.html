{{define "layout_scripts"}}
    <script>
        function closeCardModal() {
            document.getElementById('card-modal').innerHTML = '';
        }

        function closeCreateModal() {
            document.getElementById('create-modal').innerHTML = '';
        }

        function updateCreateParentSelect() {
            var cardTypeSelect = document.getElementById('create-card-type');
            if (!cardTypeSelect) {
                return;
            }
            var cardType = cardTypeSelect.value;
            var projectWrap = document.getElementById('create-parent-project-wrap');
            var storyWrap = document.getElementById('create-parent-story-wrap');
            var projectSelect = document.getElementById('create-parent-project');
            var storySelect = document.getElementById('create-parent-story');

            projectWrap.classList.add('hidden');
            storyWrap.classList.add('hidden');
            projectSelect.disabled = true;
            storySelect.disabled = true;

            if (cardType === 'story') {
                projectWrap.classList.remove('hidden');
                projectSelect.disabled = false;
            }
            if (cardType === 'task') {
                storyWrap.classList.remove('hidden');
                storySelect.disabled = false;
            }
        }

        function initCreateCardForm() {
            if (document.querySelector('[data-create-card-form]')) {
                updateCreateParentSelect();
            }
        }

        function closeStatusDropdowns() {
            document.querySelectorAll('[id^="status-menu-"]').forEach(function (menu) {
                menu.classList.add('hidden');
            });
        }

        function closeParentDropdowns() {
            document.querySelectorAll('[id^="parent-menu-"]').forEach(function (menu) {
                menu.classList.add('hidden');
            });
        }

        function toggleStatusDropdown(cardID) {
            var menu = document.getElementById('status-menu-' + cardID);
            if (!menu) {
                return;
            }
            var isHidden = menu.classList.contains('hidden');
            closeStatusDropdowns();
            closeParentDropdowns();
            if (isHidden) {
                menu.classList.remove('hidden');
            }
        }

        function toggleParentDropdown(cardID) {
            var menu = document.getElementById('parent-menu-' + cardID);
            if (!menu) {
                return;
            }
            var isHidden = menu.classList.contains('hidden');
            closeParentDropdowns();
            closeStatusDropdowns();
            if (isHidden) {
                menu.classList.remove('hidden');
            }
        }

        function selectCardParentFromOption(button, cardID) {
            var parentID = button.getAttribute('data-parent-id');
            var parentTitle = button.getAttribute('data-parent-title');
            if (!parentID || !parentTitle) {
                return;
            }

            var container = document.getElementById('parent-dropdown-' + cardID);
            if (!container) {
                return;
            }

            var parentInput = container.querySelector('[data-parent-input]');
            if (parentInput) {
                parentInput.value = parentID;
                parentInput.dispatchEvent(new Event('change', { bubbles: true }));
            }

            var parentLink = container.querySelector('[data-parent-link]');
            if (parentLink) {
                parentLink.textContent = 'Under ' + parentTitle;
                parentLink.setAttribute('hx-get', '/cards/' + parentID + '/detail');
                if (typeof htmx !== 'undefined') {
                    htmx.process(parentLink);
                }
            }

            container.querySelectorAll('[data-parent-id]').forEach(function (option) {
                var currentLabel = option.querySelector('.text-slate-400');
                if (option.getAttribute('data-parent-id') === parentID) {
                    if (!currentLabel) {
                        var label = document.createElement('span');
                        label.className = 'ml-2 shrink-0 text-xs text-slate-400';
                        label.textContent = 'Current';
                        option.appendChild(label);
                    }
                } else if (currentLabel) {
                    currentLabel.remove();
                }
            });

            closeParentDropdowns();
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeStatusDropdowns();
                closeParentDropdowns();
                closeProjectFilterPanel();
                closeChildFilterModal();
                closeCreateModal();
                closeCardModal();
            }
        });

        document.addEventListener('click', function (event) {
            if (!event.target.closest('[id^="status-dropdown-"]')) {
                closeStatusDropdowns();
            }
            if (!event.target.closest('[id^="parent-dropdown-"]')) {
                closeParentDropdowns();
            }
            if (!event.target.closest('[data-project-filter]')) {
                closeProjectFilterPanel();
            }
        }, true);

        function initSortable() {
            document.querySelectorAll('[data-sortable-column]').forEach(function (columnList) {
                if (columnList.sortableInstance) {
                    columnList.sortableInstance.destroy();
                }
                columnList.sortableInstance = new Sortable(columnList, {
                    group: 'kanban-cards',
                    animation: 150,
                    draggable: '[data-card-id]',
                    filter: 'button, a',
                    preventOnFilter: false,
                    onEnd: function (event) {
                        var cardElement = event.item;
                        var cardID = cardElement.getAttribute('data-card-id');
                        var targetColumn = event.to;
                        var columnID = targetColumn.getAttribute('data-column-id');
                        var position = event.newIndex;

                        htmx.ajax('PUT', '/cards/' + cardID + '/move', {
                            target: '#column-' + columnID,
                            swap: 'outerHTML',
                            values: {
                                column_id: columnID,
                                position: position
                            }
                        });
                    }
                });
            });
        }

        function getBoardScopeID() {
            var boardRoot = document.querySelector('[data-board-id]');
            return boardRoot ? boardRoot.getAttribute('data-board-id') : '';
        }

        function hideDoneStorageKey() {
            return 'kanban-hide-done-children-' + getBoardScopeID();
        }

        function showArchivedStorageKey() {
            return 'kanban-show-archived-children-' + getBoardScopeID();
        }

        function isHideDoneEnabled() {
            return localStorage.getItem(hideDoneStorageKey()) === 'true';
        }

        function setHideDoneEnabled(enabled) {
            localStorage.setItem(hideDoneStorageKey(), enabled ? 'true' : 'false');
        }

        function isShowArchivedEnabled() {
            return localStorage.getItem(showArchivedStorageKey()) === 'true';
        }

        function setShowArchivedEnabled(enabled) {
            localStorage.setItem(showArchivedStorageKey(), enabled ? 'true' : 'false');
        }

        function openChildFilterModal() {
            var modal = document.getElementById('child-filter-modal');
            if (modal) {
                modal.classList.remove('hidden');
            }
            syncChildFilterCheckboxes();
        }

        function closeChildFilterModal() {
            var modal = document.getElementById('child-filter-modal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        function syncChildFilterCheckboxes() {
            var hideDone = isHideDoneEnabled();
            var showArchived = isShowArchivedEnabled();
            document.querySelectorAll('[data-hide-done-filter]').forEach(function (checkbox) {
                checkbox.checked = hideDone;
            });
            document.querySelectorAll('[data-show-archived-filter]').forEach(function (checkbox) {
                checkbox.checked = showArchived;
            });
        }

        function applyChildFilters() {
            var hideDone = isHideDoneEnabled();
            var showArchived = isShowArchivedEnabled();
            var filtersActive = hideDone || showArchived;

            syncChildFilterCheckboxes();
            document.querySelectorAll('[data-child-filter-active]').forEach(function (badge) {
                badge.classList.toggle('hidden', !filtersActive);
            });

            document.querySelectorAll('[data-child-list] > li').forEach(function (item) {
                var isDone = item.hasAttribute('data-child-done');
                var isArchived = item.hasAttribute('data-child-archived');
                var visible = true;
                if (isArchived && !showArchived) {
                    visible = false;
                }
                if (hideDone && isDone && visible) {
                    visible = false;
                }
                item.classList.toggle('hidden', !visible);
            });

            document.querySelectorAll('[data-children-section]').forEach(function (section) {
                var list = section.querySelector('[data-child-list]');
                var allDoneMessage = section.querySelector('[data-all-done-hidden]');
                var allArchivedMessage = section.querySelector('[data-all-archived-hidden]');
                if (!list) {
                    return;
                }

                var visibleItems = list.querySelectorAll('li:not(.hidden)');
                var hasDoneItems = list.querySelector('[data-child-done="true"]') !== null;
                var hasArchivedItems = list.querySelector('[data-child-archived="true"]') !== null;

                if (allDoneMessage) {
                    var showAllDoneMessage = hideDone && hasDoneItems && visibleItems.length === 0;
                    allDoneMessage.classList.toggle('hidden', !showAllDoneMessage);
                }
                if (allArchivedMessage) {
                    var showAllArchivedMessage = !showArchived && hasArchivedItems && visibleItems.length === 0;
                    allArchivedMessage.classList.toggle('hidden', !showAllArchivedMessage);
                }
            });
        }

        function initChildFilters() {
            var filterModal = document.getElementById('child-filter-modal');
            if (filterModal && filterModal.dataset.childFilterInitialized !== 'true') {
                filterModal.dataset.childFilterInitialized = 'true';

                filterModal.querySelectorAll('[data-hide-done-filter]').forEach(function (checkbox) {
                    checkbox.addEventListener('change', function () {
                        setHideDoneEnabled(checkbox.checked);
                        applyChildFilters();
                    });
                });

                filterModal.querySelectorAll('[data-show-archived-filter]').forEach(function (checkbox) {
                    checkbox.addEventListener('change', function () {
                        setShowArchivedEnabled(checkbox.checked);
                        applyChildFilters();
                    });
                });
            }

            applyChildFilters();
        }

        function projectFilterStorageKey() {
            return 'kanban-project-filter-' + getBoardScopeID();
        }

        function getSelectedProjectIds() {
            var stored = localStorage.getItem(projectFilterStorageKey());
            if (!stored) {
                return [];
            }
            try {
                var parsed = JSON.parse(stored);
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                return [];
            }
        }

        function setSelectedProjectIds(projectIds) {
            localStorage.setItem(projectFilterStorageKey(), JSON.stringify(projectIds));
        }

        function filterProjectOptions(query) {
            var normalizedQuery = query.trim().toLowerCase();
            document.querySelectorAll('[data-project-filter-option]').forEach(function (option) {
                var title = (option.dataset.projectTitle || '').toLowerCase();
                var visible = normalizedQuery === '' || title.indexOf(normalizedQuery) !== -1;
                option.classList.toggle('hidden', !visible);
            });
        }

        function closeProjectFilterPanel() {
            document.querySelectorAll('[data-project-filter-panel]').forEach(function (panel) {
                panel.classList.add('hidden');
            });
        }

        function boardSearchStorageKey() {
            return 'kanban-board-search-' + getBoardScopeID();
        }

        function getBoardSearchQuery() {
            var searchRoot = document.querySelector('[data-board-search]');
            if (searchRoot) {
                var input = searchRoot.querySelector('[data-board-search-input]');
                if (input) {
                    return input.value;
                }
            }
            return localStorage.getItem(boardSearchStorageKey()) || '';
        }

        function setBoardSearchQuery(query) {
            localStorage.setItem(boardSearchStorageKey(), query);
        }

        function cardMatchesSearch(card, searchQuery) {
            if (searchQuery === '') {
                return true;
            }
            var title = (card.getAttribute('data-card-title') || '').toLowerCase();
            var description = (card.getAttribute('data-card-description') || '').toLowerCase();
            return title.indexOf(searchQuery) !== -1 || description.indexOf(searchQuery) !== -1;
        }

        function applyCardFilters() {
            var selected = getSelectedProjectIds();
            var hasProjectFilter = selected.length > 0;
            var searchQuery = getBoardSearchQuery().trim().toLowerCase();
            var hasSearch = searchQuery !== '';

            document.querySelectorAll('[data-card-id]').forEach(function (card) {
                var visible = true;
                if (hasProjectFilter) {
                    var projectId = card.getAttribute('data-project-id');
                    visible = projectId && selected.indexOf(projectId) !== -1;
                }
                if (visible && hasSearch) {
                    visible = cardMatchesSearch(card, searchQuery);
                }
                card.classList.toggle('hidden', !visible);
            });
        }

        function applyProjectFilter() {
            var selected = getSelectedProjectIds();
            var filterRoot = document.querySelector('[data-project-filter]');
            if (!filterRoot) {
                applyCardFilters();
                return;
            }

            var countBadge = filterRoot.querySelector('[data-project-filter-count]');
            var clearButton = filterRoot.querySelector('[data-project-filter-clear]');
            var chipsContainer = filterRoot.querySelector('[data-project-filter-chips]');
            var hasFilter = selected.length > 0;

            if (countBadge) {
                countBadge.textContent = String(selected.length);
                countBadge.classList.toggle('hidden', !hasFilter);
            }
            if (clearButton) {
                clearButton.classList.toggle('hidden', !hasFilter);
            }

            filterRoot.querySelectorAll('[data-project-filter-checkbox]').forEach(function (checkbox) {
                checkbox.checked = selected.indexOf(checkbox.value) !== -1;
            });

            if (chipsContainer) {
                chipsContainer.innerHTML = '';
                selected.forEach(function (projectId) {
                    var checkbox = filterRoot.querySelector('[data-project-filter-checkbox][value="' + projectId + '"]');
                    if (!checkbox) {
                        return;
                    }
                    var option = checkbox.closest('[data-project-filter-option]');
                    var titleElement = option ? option.querySelector('span.truncate') : null;
                    var title = titleElement ? titleElement.textContent.trim() : 'Project';

                    var chip = document.createElement('button');
                    chip.type = 'button';
                    chip.className = 'inline-flex items-center gap-1 rounded-full bg-purple-100 px-3 py-1 text-xs font-medium text-purple-700 hover:bg-purple-200';
                    chip.addEventListener('click', function () {
                        var updated = getSelectedProjectIds().filter(function (id) {
                            return id !== projectId;
                        });
                        setSelectedProjectIds(updated);
                        applyProjectFilter();
                    });

                    var titleSpan = document.createElement('span');
                    titleSpan.textContent = title;
                    var closeSpan = document.createElement('span');
                    closeSpan.setAttribute('aria-hidden', 'true');
                    closeSpan.textContent = '×';
                    chip.appendChild(titleSpan);
                    chip.appendChild(closeSpan);
                    chipsContainer.appendChild(chip);
                });
            }

            applyCardFilters();
        }

        function applyBoardSearch() {
            var searchRoot = document.querySelector('[data-board-search]');
            if (!searchRoot) {
                return;
            }

            var searchInput = searchRoot.querySelector('[data-board-search-input]');
            var clearButton = searchRoot.querySelector('[data-board-search-clear]');
            var query = searchInput ? searchInput.value : '';
            var hasSearch = query.trim() !== '';

            if (clearButton) {
                clearButton.classList.toggle('hidden', !hasSearch);
            }

            setBoardSearchQuery(query);
            applyCardFilters();
        }

        function clearBoardSearch() {
            var searchRoot = document.querySelector('[data-board-search]');
            if (!searchRoot) {
                return;
            }

            var searchInput = searchRoot.querySelector('[data-board-search-input]');
            if (searchInput) {
                searchInput.value = '';
            }
            setBoardSearchQuery('');
            applyBoardSearch();
        }

        function initBoardSearch() {
            var searchRoot = document.querySelector('[data-board-search]');
            if (!searchRoot) {
                return;
            }

            if (searchRoot.dataset.boardSearchInitialized !== 'true') {
                searchRoot.dataset.boardSearchInitialized = 'true';

                var searchInput = searchRoot.querySelector('[data-board-search-input]');
                var clearButton = searchRoot.querySelector('[data-board-search-clear]');

                if (searchInput) {
                    searchInput.addEventListener('input', applyBoardSearch);
                }
                if (clearButton) {
                    clearButton.addEventListener('click', clearBoardSearch);
                }
            }

            var searchInput = searchRoot.querySelector('[data-board-search-input]');
            if (searchInput && searchInput.value === '') {
                searchInput.value = localStorage.getItem(boardSearchStorageKey()) || '';
            }
            applyBoardSearch();
        }

        function clearProjectFilter() {
            setSelectedProjectIds([]);
            var searchInput = document.querySelector('[data-project-filter-search]');
            if (searchInput) {
                searchInput.value = '';
            }
            filterProjectOptions('');
            applyProjectFilter();
        }

        function initProjectFilter() {
            var filterRoot = document.querySelector('[data-project-filter]');
            if (!filterRoot) {
                return;
            }

            if (filterRoot.dataset.projectFilterInitialized !== 'true') {
                filterRoot.dataset.projectFilterInitialized = 'true';

                var toggleButton = filterRoot.querySelector('[data-project-filter-toggle]');
                var clearButton = filterRoot.querySelector('[data-project-filter-clear]');
                var searchInput = filterRoot.querySelector('[data-project-filter-search]');

                if (toggleButton) {
                    toggleButton.addEventListener('click', function (event) {
                        event.stopPropagation();
                        var panel = filterRoot.querySelector('[data-project-filter-panel]');
                        if (panel) {
                            panel.classList.toggle('hidden');
                        }
                    });
                }

                if (clearButton) {
                    clearButton.addEventListener('click', clearProjectFilter);
                }

                if (searchInput) {
                    searchInput.addEventListener('input', function () {
                        filterProjectOptions(searchInput.value);
                    });
                }

                filterRoot.querySelectorAll('[data-project-filter-checkbox]').forEach(function (checkbox) {
                    checkbox.addEventListener('change', function () {
                        var selected = getSelectedProjectIds();
                        if (checkbox.checked) {
                            if (selected.indexOf(checkbox.value) === -1) {
                                selected.push(checkbox.value);
                            }
                        } else {
                            selected = selected.filter(function (id) {
                                return id !== checkbox.value;
                            });
                        }
                        setSelectedProjectIds(selected);
                        applyProjectFilter();
                    });
                });
            }

            applyProjectFilter();
        }

        function getBoardNameFromServer(nameInput) {
            return nameInput.getAttribute('data-saved-name') || '';
        }

        function resetBoardNameInput(nameInput) {
            var savedName = getBoardNameFromServer(nameInput);
            nameInput.value = savedName;
            nameInput.defaultValue = savedName;
            return savedName;
        }

        function initBoardNameForm() {
            document.querySelectorAll('[data-board-name-form]').forEach(function (form) {
                if (form.dataset.unsavedTrackerInitialized === 'true') {
                    return;
                }
                form.dataset.unsavedTrackerInitialized = 'true';

                var nameInput = form.querySelector('[data-board-name-input]');
                var actions = form.querySelector('[data-board-name-actions]');
                var saveButton = form.querySelector('[data-board-name-save]');
                var unsavedLabel = form.querySelector('[data-unsaved-label]');
                if (!nameInput || !actions) {
                    return;
                }

                var savedName = resetBoardNameInput(nameInput);

                function showActions() {
                    actions.classList.remove('hidden');
                }

                function hideActions() {
                    actions.classList.add('hidden');
                }

                function updateUnsavedState() {
                    var hasUnsaved = nameInput.value !== savedName;
                    var isFocused = document.activeElement === nameInput;
                    var showHighlight = hasUnsaved && !isFocused;

                    nameInput.classList.toggle('border-amber-300', showHighlight);
                    nameInput.classList.toggle('bg-amber-50', showHighlight);
                    nameInput.classList.toggle('ring-2', showHighlight);
                    nameInput.classList.toggle('ring-amber-200', showHighlight);
                    nameInput.classList.toggle('px-2', showHighlight);

                    if (unsavedLabel) {
                        unsavedLabel.classList.toggle('hidden', !hasUnsaved);
                    }
                }

                nameInput.addEventListener('focus', function () {
                    showActions();
                    updateUnsavedState();
                });

                nameInput.addEventListener('blur', function () {
                    window.setTimeout(function () {
                        if (form.contains(document.activeElement)) {
                            return;
                        }
                        hideActions();
                        updateUnsavedState();
                    }, 0);
                });

                if (saveButton) {
                    saveButton.addEventListener('mousedown', function (event) {
                        event.preventDefault();
                    });
                }

                nameInput.addEventListener('input', updateUnsavedState);

                form.addEventListener('htmx:afterRequest', function (event) {
                    if (!event.detail.successful) {
                        return;
                    }
                    savedName = nameInput.value;
                    nameInput.setAttribute('data-saved-name', savedName);
                    nameInput.defaultValue = savedName;
                    document.title = nameInput.value + ' - Kanban';
                    updateUnsavedState();
                    hideActions();
                });

                updateUnsavedState();
            });
        }

        window.addEventListener('pageshow', function () {
            document.querySelectorAll('[data-board-name-input]').forEach(function (nameInput) {
                var savedName = resetBoardNameInput(nameInput);
                nameInput.classList.remove('border-amber-300', 'bg-amber-50', 'ring-2', 'ring-amber-200', 'px-2');
                if (document.querySelector('[data-board-name-form]')) {
                    document.title = savedName + ' - Kanban';
                }
            });
        });

        function initCardEditForms() {
            document.querySelectorAll('[data-card-edit-form]').forEach(function (form) {
                if (form.dataset.unsavedTrackerInitialized === 'true') {
                    return;
                }
                form.dataset.unsavedTrackerInitialized = 'true';

                var titleInput = form.querySelector('[name="title"]');
                var descriptionInput = form.querySelector('[name="description"]');
                var parentSelect = form.querySelector('[name="parent_card_id"]');
                var unsavedLabel = form.querySelector('[data-unsaved-label]');
                if (!titleInput || !descriptionInput || !unsavedLabel) {
                    return;
                }

                var originalTitle = titleInput.value;
                var originalDescription = descriptionInput.value;
                var originalParentID = parentSelect ? parentSelect.value : '';

                function updateUnsavedLabel() {
                    var hasChanges = titleInput.value !== originalTitle
                        || descriptionInput.value !== originalDescription
                        || (parentSelect && parentSelect.value !== originalParentID);
                    unsavedLabel.classList.toggle('hidden', !hasChanges);
                }

                titleInput.addEventListener('input', updateUnsavedLabel);
                descriptionInput.addEventListener('input', updateUnsavedLabel);
                if (parentSelect) {
                    parentSelect.addEventListener('change', updateUnsavedLabel);
                }

                form.addEventListener('htmx:afterRequest', function (event) {
                    if (!event.detail.successful) {
                        return;
                    }
                    originalTitle = titleInput.value;
                    originalDescription = descriptionInput.value;
                    if (parentSelect) {
                        originalParentID = parentSelect.value;
                    }
                    updateUnsavedLabel();
                });
            });
        }

        function applyBoardsListSearch() {
            var searchInput = document.querySelector('[data-boards-search-input]');
            if (!searchInput) {
                return;
            }

            var query = searchInput.value.trim().toLowerCase();
            var visibleCount = 0;
            document.querySelectorAll('[data-boards-list] [data-board-name]').forEach(function (boardLink) {
                var name = (boardLink.getAttribute('data-board-name') || '').toLowerCase();
                var visible = query === '' || name.indexOf(query) !== -1;
                boardLink.classList.toggle('hidden', !visible);
                if (visible) {
                    visibleCount += 1;
                }
            });

            var emptyMessage = document.querySelector('[data-boards-search-empty]');
            if (emptyMessage) {
                emptyMessage.classList.toggle('hidden', visibleCount > 0 || query === '');
            }
        }

        function initBoardsListSearch() {
            var searchInput = document.querySelector('[data-boards-search-input]');
            if (!searchInput || searchInput.dataset.boardsSearchInitialized === 'true') {
                return;
            }
            searchInput.dataset.boardsSearchInitialized = 'true';
            searchInput.addEventListener('input', applyBoardsListSearch);
        }

        document.addEventListener('DOMContentLoaded', function () {
            initSortable();
            initBoardNameForm();
            initCardEditForms();
            initCreateCardForm();
            initChildFilters();
            initBoardSearch();
            initProjectFilter();
            initBoardsListSearch();
        });
        document.body.addEventListener('htmx:afterSwap', function () {
            initSortable();
            initBoardNameForm();
            initCardEditForms();
            initCreateCardForm();
            initChildFilters();
            initBoardSearch();
            applyProjectFilter();
        });
        document.body.addEventListener('htmx:oobAfterSwap', function () {
            initSortable();
            initCardEditForms();
            initChildFilters();
            applyBoardSearch();
            applyProjectFilter();
        });
    </script>
{{end}}
